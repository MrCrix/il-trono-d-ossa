<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Tracker - Il Trono d'Ossa</title>

  <!-- Vue 3 via CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Socket.IO Client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>⚔️ Combat Tracker - Il Trono d'Ossa</h1>
      <div class="header-info">
        <span class="encounter-name">{{ state.encounter }}</span>
        <span class="round-counter">Round: {{ state.round }}</span>
      </div>
    </header>

    <main class="app-main">
      <!-- Control Panel -->
      <control-panel
        :encounters="encounters"
        :combat-active="state.combatants.length > 0"
        @init-encounter="handleInitEncounter"
        @add-pc="handleAddPC"
        @reset="handleReset"
      ></control-panel>

      <!-- Initiative Tracker -->
      <initiative-tracker
        v-if="state.combatants.length > 0"
        :combatants="state.combatants"
        :current-turn="state.current_turn"
        :round="state.round"
        @next-turn="handleNextTurn"
        @prev-turn="handlePrevTurn"
        @select-combatant="handleSelectCombatant"
      ></initiative-tracker>

      <!-- Combatants Grid -->
      <div v-if="state.combatants.length > 0" class="combatants-grid">
        <combatant-card
          v-for="(combatant, index) in state.combatants"
          :key="combatant.id"
          :combatant="combatant"
          :is-active="index === state.current_turn"
          @damage="handleDamage"
          @heal="handleHeal"
          @update="handleUpdateCombatant"
          @add-condition="handleAddCondition"
        ></combatant-card>
      </div>

      <!-- Empty State -->
      <div v-else class="empty-state">
        <p>🎲 Nessun combattimento attivo</p>
        <p>Seleziona un encounter per iniziare</p>
      </div>

      <!-- Combat Log -->
      <combat-log
        v-if="state.log.length > 0"
        :entries="state.log"
      ></combat-log>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/js/components/CombatantCard.js"></script>
  <script src="/js/components/InitiativeTracker.js"></script>
  <script src="/js/components/ControlPanel.js"></script>
  <script src="/js/components/CombatLog.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
