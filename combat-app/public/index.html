<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Tracker - Il Trono d'Ossa</title>

  <!-- Vue 3 via CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Socket.IO Client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Sortable.js for Drag and Drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- A. TOP BAR -->
    <top-bar
      :encounter-name="state.encounter"
      :round="state.round"
      :current-turn-name="currentTurnName"
      :can-undo="canUndo"
      :combat-active="state.combatants.length > 0 && state.round > 0"
      :has-combatants="state.combatants.length > 0"
      @next-turn="handleNextTurn"
      @prev-turn="handlePrevTurn"
      @undo="handleUndo"
      @reset="handleReset"
      @new-encounter="handleNewEncounter"
    ></top-bar>

    <!-- Main Layout Container -->
    <div class="app-layout">
      <!-- B. LEFT COLUMN (Mode-Switching: Setup vs Roster) -->
      <left-column
        :mode="leftColumnMode"
        :encounters="encounters"
        :party-characters="partyCharacters"
        :combatants="state.combatants"
        :selected-combatant-id="selectedCombatantId"
        :filter-type="rosterFilterType"
        @init-encounter="handleInitEncounter"
        @add-pc="handleAddPC"
        @select-combatant="handleSelectCombatantById"
        @set-filter="rosterFilterType = $event"
        @new-encounter="handleNewEncounter"
        @add-combatant="handleAddCombatant"
      ></left-column>

      <!-- C. CENTER PANEL (Initiative Timeline) -->
      <div v-if="state.combatants.length > 0" class="center-panel">
        <initiative-timeline
          :combatants="state.combatants"
          :current-turn="state.current_turn"
          :hovered-id="hoveredCombatantId"
          :selected-id="selectedCombatantId"
          @select-combatant="handleSelectCombatantById"
          @hover-combatant="hoveredCombatantId = $event"
          @quick-damage="handleDamage"
          @quick-heal="handleHeal"
          @reorder-initiative="handleReorderInitiative"
        ></initiative-timeline>
      </div>
      <div v-else class="center-panel empty-state">
        <p>🎲 Nessun combattimento attivo</p>
        <p class="hint">Seleziona un encounter dal pannello a sinistra per iniziare</p>
      </div>

      <!-- D. DETAILS PANEL (Dettagli combattente selezionato) -->
      <combatant-details
        v-if="selectedCombatantId && selectedCombatant"
        :combatant="selectedCombatant"
        @damage="handleDamage"
        @heal="handleHeal"
        @update="handleUpdateCombatant"
        @add-condition="handleAddCondition"
        @remove-condition="handleRemoveCondition"
        @toggle-dead="handleToggleDead"
        @open-stat-block="openStatBlockModal"
        @close="deselectCombatant"
      ></combatant-details>
      <div v-else class="details-panel empty-state">
        <p>👈 Seleziona un combattente</p>
        <p class="hint">Click su un nome nella timeline</p>
      </div>

      <!-- E. RIGHT PANEL (Combat Log) -->
      <div class="right-panel">
        <combat-log
          :entries="state.log"
          :collapsed="logCollapsed"
          @toggle-collapsed="logCollapsed = !logCollapsed"
          @clear="handleClearLog"
        ></combat-log>
      </div>
    </div>

    <!-- Stat Block Modal -->
    <stat-block-modal
      :show="showStatBlockModal"
      :combatant="selectedCombatant"
      @close="closeStatBlockModal"
    ></stat-block-modal>
  </div>

  <!-- Scripts -->
  <script src="/js/components/TopBar.js"></script>
  <script src="/js/components/LeftColumn.js"></script>
  <script src="/js/components/InitiativeTimeline.js"></script>
  <script src="/js/components/CombatantDetails.js"></script>
  <script src="/js/components/CombatLog.js"></script>
  <script src="/js/components/StatBlockModal.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
